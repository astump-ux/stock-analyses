name: Update index.json after Deploy

on:
  push:
    branches: [main]

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Update index.json for changed tickers
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '\.html$' || true)
          echo "Changed HTML files: $CHANGED"
          if [ -z "$CHANGED" ]; then echo "No HTML changed, skipping."; exit 0; fi

          for FILE in $CHANGED; do
            TICKER=$(basename "$FILE" .html)
            JSON_FILE="${TICKER}.json"
            echo "→ Processing $TICKER"

            python3 .github/scripts/update_index.py \
              "$TICKER" "$JSON_FILE" index.json > /tmp/index_updated.json

            cp /tmp/index_updated.json index.json
            echo "✅ index.json updated für $TICKER"
          done

          # Commit updated index.json back
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add index.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Auto-update index.json [skip ci]"
          git push origin main
